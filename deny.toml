[advisories]
version = 2
unmaintained = "all"
# Exception for paste: transitive dependency of thirtyfour (used in tests-browsers)
# See: https://rustsec.org/advisories/RUSTSEC-2024-0436
ignore = [
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "ISC",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Zlib",
]
confidence-threshold = 1.0

# option-ext is a transitive test-only dep: tests-browsers -> thirtyfour -> dirs -> dirs-sys -> option-ext
[[licenses.exceptions]]
allow = ["MPL-2.0"]
name = "option-ext"

[bans]
wildcards = "deny"
skip = [
    { crate = "huginn-ebpf", reason = "workspace deps for huginn-ebpf-common" },
]

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
