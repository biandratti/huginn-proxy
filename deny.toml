[advisories]
version = 2
unmaintained = "all"
ignore = [
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "ISC",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Zlib",
    "MPL-2.0"
]
confidence-threshold = 1.0

#[[licenses.exceptions]]

[bans]
wildcards = "deny"
skip = [
    { crate = "huginn-ebpf", reason = "workspace deps for huginn-ebpf-common" },
]

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
