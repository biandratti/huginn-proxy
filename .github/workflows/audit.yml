name: Security audit

on:
  push:
    branches: [ "master" ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  cargo-deny:
    name: Cargo Deny (Workspace)
    permissions:
      checks: write
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: EmbarkStudios/cargo-deny-action@v2

  cargo-audit:
    name: Cargo Audit (Workspace)
    permissions:
      checks: write
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: rustsec/audit-check@v2.0.0
      id: audit
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # Close any open advisory issues that are no longer reported by cargo-audit.
    # rustsec/audit-check opens issues but does not close them when a fix lands.
    # If the previous step succeeded, the audit is clean — close all open RUSTSEC issues.
    - name: Close resolved advisory issues
      if: success()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh api "repos/$GITHUB_REPOSITORY/issues?state=open&per_page=100" \
          --jq '.[] | select(.title | test("^RUSTSEC-")) | "\(.number) \(.title)"' \
        | while IFS= read -r line; do
            number=$(echo "$line" | cut -d' ' -f1)
            title=$(echo "$line" | cut -d' ' -f2-)
            echo "Closing issue #$number — $title (cargo audit is clean)"
            gh issue close "$number" \
              --comment "Resolved: \`cargo audit\` is clean on this commit. Closing automatically."
          done
