# Dry-run the same upload → download (aarch64-* / x86_64-*) → flatten path as release.yml publish-release-assets.
# Triggers: manual, or PRs that touch release workflow files.

name: Validate release asset download

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/release.yml'
      - '.github/workflows/validate-release-assets.yml'

jobs:
  upload-mock-binaries:
    name: Upload mock ${{ matrix.artifact_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Same artifact names and filename shape as .github/workflows/release.yml binary jobs.
          - artifact_name: x86_64-unknown-linux-gnu-ebpf
            filename: huginn-proxy-v0.0.0-validate-x86_64-unknown-linux-gnu-ebpf
          - artifact_name: aarch64-unknown-linux-gnu-ebpf
            filename: huginn-proxy-v0.0.0-validate-aarch64-unknown-linux-gnu-ebpf
          - artifact_name: x86_64-unknown-linux-gnu-ebpf-agent
            filename: huginn-ebpf-agent-v0.0.0-validate-x86_64-unknown-linux-gnu-ebpf-agent
          - artifact_name: aarch64-unknown-linux-gnu-ebpf-agent
            filename: huginn-ebpf-agent-v0.0.0-validate-aarch64-unknown-linux-gnu-ebpf-agent
          - artifact_name: x86_64-unknown-linux-musl
            filename: huginn-proxy-v0.0.0-validate-x86_64-unknown-linux-musl
          - artifact_name: aarch64-unknown-linux-musl
            filename: huginn-proxy-v0.0.0-validate-aarch64-unknown-linux-musl
          - artifact_name: x86_64-apple-darwin
            filename: huginn-proxy-v0.0.0-validate-x86_64-apple-darwin
          - artifact_name: aarch64-apple-darwin
            filename: huginn-proxy-v0.0.0-validate-aarch64-apple-darwin

    steps:
      - name: Create mock file
        run: |
          echo "mock binary for ${{ matrix.filename }}" > "${{ matrix.filename }}"
          chmod +x "${{ matrix.filename }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.filename }}

  verify-same-as-release-publish:
    name: Verify download + flatten (matches publish-release-assets)
    runs-on: ubuntu-latest
    needs: upload-mock-binaries
    permissions:
      actions: read
    steps:
      - name: Download binary artifacts (aarch64)
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: aarch64-*
          merge-multiple: false

      - name: Download binary artifacts (x86_64)
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: x86_64-*
          merge-multiple: false

      - name: Flatten binaries for release upload
        run: |
          mkdir -p upload
          find release-assets -type f \( -name 'huginn-proxy-*' -o -name 'huginn-ebpf-agent-*' \) -exec cp -t upload/ {} +
          ls -la upload/
          count=$(find upload -type f | wc -l)
          echo "File count: ${count}"
          test "${count}" -eq 8
