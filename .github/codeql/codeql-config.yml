# Loaded via github/codeql-action/init `config-file` (see workflows/codeql.yml).
#
# reqwest::Client::builder().danger_accept_invalid_certs(true) is required for e2e/benches
# against local HTTPS with self-signed certs. CodeQL flags rust/disabled-certificate-check.
# Exclude only that query; other security and quality rules still run.
query-filters:
  - exclude:
      id: rust/disabled-certificate-check
