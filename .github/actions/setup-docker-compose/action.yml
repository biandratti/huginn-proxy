name: 'Setup Docker Compose services'
description: 'Set up Docker Buildx, generate TLS certificates, build images, and start Docker Compose services'
inputs:
  compose-dir:
    description: 'Directory containing the compose files (default: examples)'
    required: false
    default: 'examples'
  health-timeout:
    description: 'Timeout in seconds to wait for services to be healthy (default: 120)'
    required: false
    default: '120'
  ready-delay:
    description: 'Additional delay in seconds after services are healthy (default: 5)'
    required: false
    default: '5'
runs:
  using: 'composite'
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Generate TLS certificates
      shell: bash
      run: bash examples/gen-certs.sh

    - name: Start Docker Compose services
      shell: bash
      env:
        DOCKER_BUILDKIT: 1
        COMPOSE_DOCKER_CLI_BUILD: 1
      run: |
        cd ${{ inputs.compose-dir }}
        docker buildx build \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          -f ../docker/proxy.Dockerfile \
          --target ebpf \
          -t examples_proxy:latest \
          --load \
          ..
        docker buildx build \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          -f ../docker/ebpf-agent.Dockerfile \
          -t examples_ebpf-agent:latest \
          --load \
          ..
        docker compose -f docker-compose.ebpf.yml up -d
        echo "Waiting for proxy and ebpf-agent to be healthy..."
        timeout ${{ inputs.health-timeout }} bash -c \
          'until docker compose -f docker-compose.ebpf.yml ps proxy | grep -q "(healthy)" && docker compose -f docker-compose.ebpf.yml ps ebpf-agent | grep -q "(healthy)"; do sleep 2; done'
        docker compose -f docker-compose.ebpf.yml ps
        echo "Waiting for services to be ready..."
        sleep ${{ inputs.ready-delay }}
