services:
  ebpf-agent:
    build:
      context: ..
      dockerfile: Dockerfile.ebpf-agent
    # Share the proxy's network namespace so XDP on eth0 captures SYN
    # packets arriving at the proxy. Docker starts the proxy first.
    network_mode: "service:proxy"
    cap_add:
      - CAP_BPF
      - CAP_NET_ADMIN
      - CAP_PERFMON
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      - HUGINN_EBPF_INTERFACE=eth0
      - HUGINN_EBPF_DST_IP=0.0.0.0
      - HUGINN_EBPF_DST_PORT=7000
      - HUGINN_EBPF_PIN_PATH=/sys/fs/bpf/huginn
    healthcheck:
      test: ["CMD-SHELL", "test -e /sys/fs/bpf/huginn/tcp_syn_map && test -e /sys/fs/bpf/huginn/syn_counter"]
      interval: 2s
      timeout: 1s
      retries: 30
      start_period: 5s
    volumes:
      - bpffs:/sys/fs/bpf

  proxy:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["/usr/local/bin/huginn-proxy", "/config/compose.toml"]
    environment:
      - HUGINN_EBPF_PIN_PATH=/sys/fs/bpf/huginn
    volumes:
      - ./config/compose.toml:/config/compose.toml:ro
      - ./certs:/config/certs:ro
      - bpffs:/sys/fs/bpf
    ports:
      - "7000:7000"
      - "9090:9090"
    cap_add:
      - CAP_BPF
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9090' 2>/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      backend-a:
        condition: service_started
      backend-b:
        condition: service_started

  backend-a:
    build:
      context: ..
      dockerfile: examples/backend/Dockerfile

  backend-b:
    build:
      context: ..
      dockerfile: examples/backend/Dockerfile

volumes:
  bpffs:
    driver: local
    driver_opts:
      type: bpf
      o: ""
      device: bpffs
