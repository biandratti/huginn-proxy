# Observability stack: Prometheus + Grafana + cAdvisor (container CPU / memory).
# Run AFTER the main proxy stack so port 9090/9091 are already published on the host.
# Prometheus reaches the proxy and eBPF agent via host.docker.internal (host-gateway).
# cAdvisor reads host cgroups and exposes /metrics on the compose network (Prometheus scrapes it).
#
# Start:
#   docker compose -f docker-compose.observability.yml up -d
#
# Access:
#   Grafana:    http://localhost:3000  (admin / huginn)
#   Prometheus: http://localhost:9092

# Explicit project name avoids collision with the main proxy stack (both live in examples/).
name: huginn-observability

services:
  # Volumes match the upstream quick start: https://github.com/google/cadvisor#quick-start-running-cadvisor-in-a-docker-container
  cadvisor:
    image: ghcr.io/google/cadvisor:0.55.1
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8099:8080"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.11.2
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9092:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - cadvisor
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.14
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=huginn
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_LOG_LEVEL=warn
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/huginn-proxy.json
    depends_on:
      - prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/jaeger:2.18.0
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # Jaeger UI (HTTP)
      - "16687:16687" # Jaeger UI (gRPC / query API)
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    command:
      - "--set=receivers.otlp.protocols.grpc.endpoint=0.0.0.0:4317"
      - "--set=receivers.otlp.protocols.http.endpoint=0.0.0.0:4318"
      # In-memory storage
      - "--set=extensions.jaeger_storage.backends.memstore.memory.max_traces=100000"
      # Log level
      - "--set=service.telemetry.logs.level=info"

volumes:
  prometheus-data:
  grafana-data:
