# Top-level scalar keys
preserve_host: false

listen:
  addrs:
    - "0.0.0.0:7000"
    - "[::]:7000"
  # tcp_backlog: 4096

backends:
  - address: "backend-a:9000"
    http_version: http11
    health_check:
      type: http
      path: /
      expected_status: 200
      interval_secs: 2
      timeout_secs: 2
  - address: "backend-b:9000"
    http_version: http11
  # No Docker service with this name — TCP probes fail immediately.
  # Used by E2E to verify the proxy returns 502 when all candidates are unhealthy.
  - address: "unreachable-backend:9000"
    http_version: http11
    health_check:
      type: tcp
      interval_secs: 1
      timeout_secs: 1
      unhealthy_threshold: 2
      healthy_threshold: 2

routes:
  # Basic route with fingerprinting and connection pooling
  - prefix: "/api"
    backend: "backend-a:9000"
    fingerprinting: true
    force_new_connection: false

  # Route without fingerprinting
  - prefix: "/static"
    backend: "backend-b:9000"
    fingerprinting: false
    force_new_connection: false

  # Advanced: force new TCP+TLS handshake per request for fresh fingerprints
  - prefix: "/fingerprint"
    backend: "backend-a:9000"
    fingerprinting: true
    force_new_connection: true

  # Path stripping: /strip/users → /users
  - prefix: "/strip"
    backend: "backend-a:9000"
    fingerprinting: true
    replace_path: ""

  # Path rewriting: /old/data → /new/data
  - prefix: "/old"
    backend: "backend-b:9000"
    fingerprinting: true
    replace_path: "/new"

  # Path rewriting to versioned API: /v1/endpoint → /api/v1/endpoint
  - prefix: "/v1"
    backend: "backend-a:9000"
    fingerprinting: true
    replace_path: "/api/v1"

  # Load-balance probe route: same prefix mapped to two backends.
  # Used by E2E tests to verify real backend distribution.
  - prefix: "/lb"
    backend: "backend-a:9000"
    fingerprinting: true
    
  - prefix: "/lb"
    backend: "backend-b:9000"
    fingerprinting: true

  # Route to unreachable backend — health checks will fail and proxy returns 502.
  # Used by E2E test `test_proxy_returns_502_when_backend_is_unhealthy`.
  - prefix: "/api/e2e-unhealthy"
    backend: "unreachable-backend:9000"

  # Default catch-all
  - prefix: "/"
    backend: "backend-b:9000"

headers:
  request:
    remove:
      - "X-Forwarded-Server"
    add:
      - name: "X-Proxy-Name"
        value: "huginn-proxy"
      - name: "X-Proxy-Version"
        value: "0.0.1"
  response:
    remove:
      - "Server"
      - "X-Powered-By"
      - "X-AspNet-Version"
    add:
      - name: "X-Proxy"
        value: "huginn-proxy"

tls:
  cert_path: "/config/certs/server.crt"
  key_path: "/config/certs/server.key"
  alpn:
    - "h2"
    - "http/1.1"
  options:
    versions:
      - "1.2"
      - "1.3"
    cipher_suites:
      - "TLS13_AES_128_GCM_SHA256"
      - "TLS13_AES_256_GCM_SHA384"
      - "TLS13_CHACHA20_POLY1305_SHA256"
      - "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256"
      - "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
      - "TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256"
      - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
      - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
      - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256"
    curve_preferences:
      - "X25519"
      - "secp256r1"
      - "secp384r1"
      - "secp521r1"

fingerprint:
  tls_enabled: true
  http_enabled: true
  tcp_enabled: true
  max_capture: 65536

logging:
  level: "info"
  show_target: false

backend_pool:
  enabled: true
  idle_timeout: 90
  pool_max_idle_per_host: 0

timeout:
  upstream_connect_ms: 5000
  proxy_idle_ms: 60000
  shutdown_secs: 30
  tls_handshake_secs: 15
  connection_handling_secs: 300
  keep_alive:
    enabled: true
    upstream_idle_timeout: 60

security:
  max_connections: 512
  ip_filter:
    mode: "disabled"
    # allowlist:
    #   - "127.0.0.1/32"
    #   - "::1/128"
    #   - "192.168.1.0/24"
  headers:
    custom:
      - name: "X-Frame-Options"
        value: "DENY"
      - name: "X-Content-Type-Options"
        value: "nosniff"
      - name: "X-XSS-Protection"
        value: "1; mode=block"
      - name: "Referrer-Policy"
        value: "strict-origin-when-cross-origin"
    hsts:
      enabled: true
      max_age: 31536000
      include_subdomains: false
      preload: false
    csp:
      enabled: true
      policy: "default-src 'self'; script-src 'self' 'unsafe-inline'"
  rate_limit:
    enabled: false
    requests_per_second: 1000
    burst: 2000
    window_seconds: 1
    limit_by: "ip"

telemetry:
  metrics_port: 9090
  otel_log_level: "warn"
