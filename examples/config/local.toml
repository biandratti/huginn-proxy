# Local dev config for: cargo run --bin huginn-proxy -- examples/config/local.toml
# Generate certs first (see examples/README.md § "Generate TLS Certificates").

preserve_host = false

[listen]
addrs = ["127.0.0.1:7000"]

[[backends]]
address = "127.0.0.1:9000"
http_version = "http11"

[[routes]]
prefix = "/"
backend = "127.0.0.1:9000"
fingerprinting = true
force_new_connection = false

[tls]
cert_path = "examples/certs/server.crt"
key_path = "examples/certs/server.key"
alpn = ["h2", "http/1.1"]

[logging]
level = "info"
show_target = true

[telemetry]
metrics_port = 9090
