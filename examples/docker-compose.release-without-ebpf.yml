# Pre-built images from GHCR (proxy without eBPF).
# Same layout as docker-compose.without-ebpf.yml; backends still build from this repo.
# Pin a version: replace :latest with :vX.Y.Z from GitHub Releases (same tag on all huginn-proxy* images).

services:
  proxy:
    image: ghcr.io/biandratti/huginn-proxy-plain:latest
    command: [ "/usr/local/bin/huginn-proxy" ]
    environment:
      # - HUGINN_CONFIG_PATH=/config/compose.toml
      - HUGINN_CONFIG_PATH=/config/compose.yaml
      - HUGINN_WATCH=true
      - HUGINN_WATCH_DELAY_SECS=60
    volumes:
      #- ./config/compose.toml:/config/compose.toml:ro
      - ./config/compose.yaml:/config/compose.yaml:ro
      - ./certs:/config/certs:ro
    ports:
      - "0.0.0.0:7000:7000"
      - "[::]:7000:7000"
      - "0.0.0.0:9090:9090"
      - "[::]:9090:9090"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://127.0.0.1:9090/health || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    depends_on:
      backend-a:
        condition: service_started
      backend-b:
        condition: service_started

  backend-a:
    image: traefik/whoami
    command: [ "--port", "9000" ]

  backend-b:
    image: traefik/whoami
    command: [ "--port", "9000" ]

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
        - subnet: fd00:dead:beef:1::/64
